<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h2><b>simple student Registration form</b></h2>
    <form>
        <input type="text"placeholder="enter your name">
        <br>
        <input type="text"placeholder="enter your email">
        <br>
        <input type="password"placeholder="password">
        <br>
        <h2><b>select your gender</b></h2>
        <lable>
            <input type="radio"value="female"name="gender">female
            <br>
            <input type="radio"value="male"name="gender">male
        </lable>
        <h2><b>select your course</b></h2>
        <lable>
            <input type="radio"value="ECE"name="course">ECE
            <br>
             <input type="radio"value="EEE"name="course">EEE
             <br>
             <input type="radio"value="CSE"name="course">CSE
             <br>
              <input type="radio"value="AI"name="course">AI
              <br>
               <input type="radio"value="ML"name="course">ML
        </lable>
    </form>
    <h2><b>submit the form</b></h2>
    <button>submit</button>
</body>
</html>
